version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: pubsub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - pubsub-network

  pubsub-server:
    build: .
    container_name: pubsub-server
    ports:
      - "8080:8080"
    environment:
      - SERVER_ADDRESS=:8080
      - REDIS_ADDR=redis:6379  # Required
      - REDIS_PASSWORD=
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - pubsub-network

networks:
  pubsub-network:
    driver: bridge

volumes:
  redis-data:
